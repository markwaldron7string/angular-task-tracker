@if (isEditing()) {
  <div class="edit-row">
    <input #editInput class="edit-input" [value]="task().title" title="Edit task title" placeholder="Enter task title" />
    <button type="button" class="action-btn save-btn" (click)="saveEdit(editInput.value)">Save</button>
    <button type="button" class="action-btn" (click)="cancelEditing()">Cancel</button>
  </div>
} @else {
  <label class="task-label">
    <input class="task-checkbox" type="checkbox" [checked]="task().done" (change)="onToggle()" />
    <span class="task-number">{{ position() }}.</span>
    <span class="task-title" [class.done]="task().done">{{ task().title }}</span>
  </label>
  <div class="task-actions">
    <button
      type="button"
      class="reminder-btn"
      [class.has-reminder]="hasReminder()"
      [attr.aria-label]="hasReminder() ? 'Edit reminder' : 'Set reminder'"
      (click)="openReminderPicker(reminderInput)"
    >
      <svg class="bell-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z" />
      </svg>
    </button>
    <input
      #reminderInput
      class="reminder-input"
      type="datetime-local"
      [value]="reminderInputValue()"
      (change)="onReminderChange(reminderInput.value)"
    />
    <button type="button" class="action-btn" (click)="startEditing()">Edit</button>
    <button type="button" class="action-btn delete-btn" (click)="onRemove()">Delete</button>
  </div>
}
