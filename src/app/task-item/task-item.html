@if (isEditing()) {
  <div class="edit-row">
    <input #editInput class="edit-input" [value]="task().title" title="Edit task title" placeholder="Enter task title" />
    <button type="button" class="action-btn save-btn" (click)="saveEdit(editInput.value)">Save</button>
    <button type="button" class="action-btn" (click)="cancelEditing()">Cancel</button>
  </div>
} @else {
  <label class="task-label">
    <input class="task-checkbox" type="checkbox" [checked]="task().done" (change)="onToggle()" />
    <span class="task-number">{{ position() }}.</span>
    <span class="task-title" [class.done]="task().done">{{ task().title }}</span>
  </label>
  <div class="task-actions">
    <button
      type="button"
      class="reminder-btn"
      [class.has-reminder]="isReminderEnabled()"
      [attr.aria-label]="isReminderEnabled() ? 'Edit reminder' : 'Set reminder'"
      (click)="openReminderDialog()"
    >
      <svg class="bell-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z" />
      </svg>
    </button>
    <button type="button" class="action-btn" (click)="startEditing()">Edit</button>
    <button type="button" class="action-btn delete-btn" (click)="onRemove()">Delete</button>
  </div>
}

@if (showReminderDialog()) {
  <div class="reminder-overlay" (click)="closeReminderDialog()">
    <div
      class="reminder-dialog"
      role="dialog"
      aria-labelledby="reminder-title-{{ task().id }}"
      (click)="$event.stopPropagation()"
    >
      <div class="reminder-dialog-header">
        <h3 id="reminder-title-{{ task().id }}">Reminder</h3>
        <button type="button" class="reminder-close-btn" aria-label="Close" (click)="closeReminderDialog()">×</button>
      </div>

      <label class="reminder-enable-label">
        <input
          type="checkbox"
          [checked]="draftEnabled()"
          (change)="onDraftEnabledChange($event)"
        />
        Enable reminder for this task
      </label>

      <label class="reminder-datetime-label">
        Date &amp; time
        <input
          type="datetime-local"
          class="reminder-datetime-input"
          [disabled]="!draftEnabled()"
          [value]="draftReminderAt()"
          (input)="onDraftReminderAtChange($event)"
        />
      </label>
    </div>
  </div>
}
