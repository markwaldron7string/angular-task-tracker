<div class="card">
  <div class="card-header">
    <h2>All Tasks</h2>
    <div class="card-header-actions">
      <button
        type="button"
        class="btn btn-reminders"
        [class.is-on]="store.remindersMasterEnabled()"
        (click)="store.toggleRemindersMaster()"
      >
        {{ store.remindersMasterEnabled() ? 'Reminders on' : 'Reminders off' }}
      </button>
      <app-task-summary />
    </div>
  </div>

  <div class="task-stats">
    <span>{{ store.tasks().length }} total</span>
    <span class="separator">·</span>
    <span>{{ store.remaining() }} remaining</span>
  </div>

  <div class="add-task-row">
    <input
      #taskInput
      class="task-input"
      placeholder="Add a new task..."
      (keydown.enter)="store.addTask(taskInput.value); taskInput.value = ''"
    />
    <button type="button" class="btn btn-primary" (click)="store.addTask(taskInput.value); taskInput.value = ''">Add</button>
    <button type="button" class="btn btn-ghost" (click)="store.clearTasks()">Clear all</button>
  </div>

  <div class="task-list" role="list">
    @for (task of store.tasks(); track task.id) {
      <app-task-item
        role="listitem"
        [task]="task"
        [position]="$index + 1"
        (toggle)="store.toggleTask($event)"
        (remove)="store.removeTask($event)"
        (edit)="store.editTask($event.id, $event.title)"
      />
    } @empty {
      <div class="empty-state">No tasks yet.</div>
    }
  </div>
</div>
